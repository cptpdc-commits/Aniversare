<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Organizator Sărbători în Familie</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 420px; }
      h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
      p { line-height: 1.5; opacity: 0.85; }
      code {
        background: rgba(148,163,184,0.2);
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.9em;
      }
      .spin {
        width: 36px; height: 36px; margin: 0 auto 20px;
        border: 3px solid rgba(148,163,184,0.3);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: r 0.9s linear infinite;
      }
      @keyframes r { to { transform: rotate(360deg); } }
      button {
        margin-top: 18px; padding: 10px 18px; border: 0; border-radius: 8px;
        background: #38bdf8; color: #0f172a; font-weight: 600; font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spin"></div>
      <h1>Se conectează la server…</h1>
      <p>
        Aplicația încarcă instanța Next.js de pe server. Dacă vezi acest
        ecran, serverul nu este accesibil. Pornește serverul pe PC cu
        <code>npm.cmd run dev:lan</code> și asigură-te că telefonul este pe
        aceeași rețea Wi-Fi.
      </p>
      <button onclick="location.reload()">Reîncearcă</button>
    </div>
  </body>
</html>
